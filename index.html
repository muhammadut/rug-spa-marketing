<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Rug Spa - Marketing Command Center</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-primary: #0a0e17;
    --bg-secondary: #111827;
    --bg-card: #1a2236;
    --bg-card-hover: #1e2a42;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --accent-teal: #14b8a6;
    --accent-amber: #f59e0b;
    --accent-rose: #f43f5e;
    --accent-emerald: #10b981;
    --accent-orange: #f97316;
    --accent-indigo: #6366f1;
    --accent-cyan: #06b6d4;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --border: #1e293b;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh; width: 100vw;
  }

  /* ── Header ── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px;
    background: rgba(10, 14, 23, 0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent-blue); }
  .header-badge {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    background: rgba(59,130,246,0.15); color: var(--accent-blue);
    font-weight: 600; letter-spacing: 0.5px;
  }

  /* ── Breadcrumb ── */
  .breadcrumb {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 24px;
    position: fixed; top: 52px; left: 0; right: 0; z-index: 99;
    background: rgba(10, 14, 23, 0.7);
    backdrop-filter: blur(10px);
    font-size: 13px;
  }
  .breadcrumb-item { color: var(--text-muted); cursor: pointer; transition: color 0.2s; }
  .breadcrumb-item:hover { color: var(--accent-blue); }
  .breadcrumb-item.active { color: var(--text-primary); font-weight: 600; cursor: default; }
  .breadcrumb-sep { color: var(--text-muted); font-size: 10px; }

  /* ── Canvas ── */
  .canvas {
    position: fixed; top: 88px; left: 0; right: 0; bottom: 0;
    display: flex; overflow: hidden;
  }

  /* ── Graph Area ── */
  .graph-area { flex: 1; position: relative; overflow: hidden; }
  .graph-svg { width: 100%; height: 100%; }

  /* ── Nodes ── */
  .node-group { cursor: pointer; }
  .node-group:hover .node-circle { filter: brightness(1.3); }
  .node-circle {
    transition: all 0.3s ease;
    filter: drop-shadow(0 0 8px rgba(59,130,246,0.3));
  }
  .node-label {
    font-family: 'Inter', sans-serif; fill: var(--text-primary);
    text-anchor: middle; pointer-events: none; font-weight: 600;
  }
  .node-sublabel {
    font-family: 'Inter', sans-serif; fill: var(--text-secondary);
    text-anchor: middle; pointer-events: none; font-size: 11px;
  }
  .link-line { stroke: rgba(59,130,246,0.15); stroke-width: 1.5; }

  /* ── Detail Panel (side) ── */
  .detail-panel {
    width: 0; overflow: hidden;
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex; flex-direction: column;
  }
  .detail-panel.open { width: 480px; }
  .detail-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between;
  }
  .detail-title { font-size: 20px; font-weight: 700; line-height: 1.3; }
  .detail-category { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; font-weight: 600; }
  .detail-close {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    background: var(--bg-card); color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .detail-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .detail-body { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .detail-body::-webkit-scrollbar { width: 6px; }
  .detail-body::-webkit-scrollbar-track { background: transparent; }
  .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .detail-section { margin-bottom: 20px; }
  .detail-section-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); font-weight: 700; margin-bottom: 8px;
  }
  .detail-text { color: var(--text-secondary); font-size: 14px; line-height: 1.7; }
  .detail-text strong { color: var(--text-primary); }
  .detail-list { list-style: none; padding: 0; }
  .detail-list li {
    padding: 8px 12px; margin-bottom: 5px;
    background: var(--bg-card); border-radius: 8px;
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.5; border-left: 3px solid var(--accent-blue);
  }
  .claude-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 5px;
    background: rgba(139,92,246,0.15); color: var(--accent-purple);
    font-size: 10px; font-weight: 600;
  }
  .priority-tag {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  }
  .priority-high { background: rgba(244,63,94,0.15); color: var(--accent-rose); }
  .priority-medium { background: rgba(245,158,11,0.15); color: var(--accent-amber); }
  .priority-low { background: rgba(20,184,166,0.15); color: var(--accent-teal); }
  .impact-meter { height: 6px; border-radius: 3px; background: var(--bg-primary); overflow: hidden; margin-top: 4px; }
  .impact-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); }

  /* ── DEEP DIVE PAGE ── */
  .deep-dive {
    position: fixed; top: 88px; left: 0; right: 0; bottom: 0;
    background: var(--bg-primary);
    overflow-y: auto; overflow-x: hidden;
    z-index: 80;
    display: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .deep-dive.visible { display: block; opacity: 1; }
  .deep-dive::-webkit-scrollbar { width: 8px; }
  .deep-dive::-webkit-scrollbar-track { background: var(--bg-primary); }
  .deep-dive::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .dd-hero {
    padding: 48px 60px 36px;
    border-bottom: 1px solid var(--border);
    position: relative; overflow: hidden;
  }
  .dd-hero::before {
    content: ''; position: absolute; top: -40%; right: -10%; width: 400px; height: 400px;
    border-radius: 50%; filter: blur(100px); opacity: 0.12; pointer-events: none;
  }
  .dd-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-muted); font-size: 13px; font-weight: 500;
    cursor: pointer; margin-bottom: 16px; padding: 6px 12px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg-card); transition: all 0.2s;
  }
  .dd-back:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .dd-hero-title { font-size: 36px; font-weight: 800; letter-spacing: -1px; line-height: 1.2; }
  .dd-hero-sub { font-size: 16px; color: var(--text-secondary); margin-top: 10px; line-height: 1.6; max-width: 720px; }
  .dd-hero-tags { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }

  .dd-content { max-width: 1100px; margin: 0 auto; padding: 40px 60px 80px; }

  .dd-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 36px;
  }
  @media (max-width: 900px) { .dd-grid { grid-template-columns: 1fr; } }

  .dd-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px;
    transition: all 0.25s ease; cursor: default;
    position: relative; overflow: hidden;
  }
  .dd-card.clickable { cursor: pointer; }
  .dd-card.clickable:hover { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  .dd-card-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 14px;
  }
  .dd-card-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .dd-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .dd-card-meta { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

  .dd-section { margin-bottom: 40px; }
  .dd-section-header {
    font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted); font-weight: 700; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .dd-section-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
  .dd-section-text { color: var(--text-secondary); font-size: 14px; line-height: 1.8; margin-bottom: 16px; }

  .dd-step {
    display: flex; gap: 16px; padding: 18px;
    background: var(--bg-card); border-radius: 12px;
    margin-bottom: 10px; border: 1px solid var(--border);
  }
  .dd-step-num {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px;
  }
  .dd-step-content { flex: 1; }
  .dd-step-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .dd-step-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .dd-table {
    width: 100%; border-collapse: collapse;
    background: var(--bg-card); border-radius: 12px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .dd-table th {
    text-align: left; padding: 12px 16px; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
  }
  .dd-table td {
    padding: 12px 16px; font-size: 13px; color: var(--text-secondary);
    border-bottom: 1px solid var(--border); line-height: 1.5;
  }
  .dd-table tr:last-child td { border-bottom: none; }
  .dd-table td:first-child { color: var(--text-primary); font-weight: 600; }

  .dd-checklist { list-style: none; padding: 0; }
  .dd-checklist li {
    padding: 10px 14px; margin-bottom: 6px;
    background: var(--bg-card); border-radius: 10px;
    font-size: 13px; color: var(--text-secondary); line-height: 1.6;
    display: flex; gap: 10px; align-items: flex-start;
    border: 1px solid var(--border);
  }
  .dd-checklist li::before {
    content: ''; width: 18px; height: 18px; flex-shrink: 0;
    border: 2px solid var(--text-muted); border-radius: 4px; margin-top: 1px;
  }

  .dd-callout {
    padding: 20px 24px; border-radius: 12px; margin-bottom: 16px;
    border: 1px solid;
  }
  .dd-callout.purple { background: rgba(139,92,246,0.08); border-color: rgba(139,92,246,0.3); }
  .dd-callout.blue { background: rgba(59,130,246,0.08); border-color: rgba(59,130,246,0.3); }
  .dd-callout.amber { background: rgba(245,158,11,0.08); border-color: rgba(245,158,11,0.3); }
  .dd-callout-title { font-weight: 700; font-size: 14px; margin-bottom: 6px; }
  .dd-callout-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

  .dd-cols { display: flex; gap: 20px; }
  .dd-cols > div { flex: 1; }
  @media (max-width: 900px) { .dd-cols { flex-direction: column; } }

  .dd-tag {
    display: inline-block; padding: 3px 10px; border-radius: 6px;
    font-size: 11px; font-weight: 600; margin: 2px;
  }

  /* ── Floating controls ── */
  .stats-bar {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 2px; z-index: 50;
    background: rgba(17,24,39,0.9); backdrop-filter: blur(20px);
    border-radius: 16px; padding: 4px; border: 1px solid var(--border);
  }
  .stat-chip {
    padding: 8px 16px; border-radius: 12px; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .stat-number { font-weight: 700; font-size: 16px; }
  .stat-label { color: var(--text-muted); }

  .back-btn {
    position: fixed; top: 100px; left: 24px; z-index: 50;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 16px;
    color: var(--text-secondary); font-size: 13px;
    cursor: pointer; display: none; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif; font-weight: 500; transition: all 0.2s;
  }
  .back-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .back-btn.visible { display: flex; }

  .legend {
    position: fixed; top: 100px; right: 24px; z-index: 50;
    background: rgba(17,24,39,0.9); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; font-size: 11px;
  }
  .legend-title { font-weight: 700; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-label { color: var(--text-secondary); }

  .tooltip {
    position: fixed; z-index: 200;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 16px;
    pointer-events: none; opacity: 0; transition: opacity 0.2s;
    max-width: 280px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .tooltip-desc { color: var(--text-secondary); font-size: 12px; line-height: 1.5; }

  @keyframes nodeEnter {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse {
    0%,100% { opacity: 0.4; } 50% { opacity: 0.8; }
  }
  .pulse-ring { animation: pulse 2s ease-in-out infinite; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">The Rug <span>Spa</span> | Marketing Command Center</div>
    <div class="header-badge">SCARBOROUGH BRANCH</div>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<button class="back-btn" id="backBtn" onclick="navigateBack()">&#8592; Back</button>

<div class="canvas" id="canvasView">
  <div class="graph-area" id="graphArea">

  <div class="detail-panel" id="detailPanel">
    <div class="detail-header">

<div class="deep-dive" id="deepDive"></div>

<div class="legend" id="legend"></div>
<div class="stats-bar" id="statsBar"></div>
<div class="tooltip" id="tooltip">
  <div class="tooltip-title" id="tooltipTitle"></div>
  <div class="tooltip-desc" id="tooltipDesc"></div>
</div>

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let currentNode = marketingData;
let navigationStack = [];
let panelOpen = false;
let deepDiveOpen = false;
let animating = false;

// ══════════════════════════════════════════════
// SVG RENDERING
// ══════════════════════════════════════════════
const svg = document.getElementById('graphSvg');

function getCenter() {
  const r = svg.getBoundingClientRect();
  return { x: r.width / 2, y: r.height / 2 };
}

function renderGraph(node, animate = true) {
  svg.innerHTML = '';
  const center = getCenter();
  const children = node.children || [];

  // Defs
  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  const filter = document.createElementNS('http://www.w3.org/2000/svg','filter');
  filter.setAttribute('id','glow');
  filter.innerHTML = '<feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>';
  defs.appendChild(filter);
  svg.appendChild(defs);

  const radius = Math.min(center.x, center.y) * (children.length > 7 ? 0.58 : 0.52);

  // Lines
  children.forEach((child, i) => {
    const a = (2*Math.PI*i/children.length) - Math.PI/2;
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', center.x); line.setAttribute('y1', center.y);
    line.setAttribute('x2', center.x + radius*Math.cos(a));
    line.setAttribute('y2', center.y + radius*Math.sin(a));
    line.setAttribute('class','link-line');
    line.style.stroke = child.color + '30';
    svg.appendChild(line);
  });

  // Center node
  const cg = mkNode(center.x, center.y, node.name, node.subtitle||'', node.color, children.length>0?58:48, true, animate?0:-1);
  cg.addEventListener('click', () => { if(node.description && !node.children) openPanel(node); });
  svg.appendChild(cg);

  // Pulse
  const pulse = document.createElementNS('http://www.w3.org/2000/svg','circle');
  pulse.setAttribute('cx',center.x); pulse.setAttribute('cy',center.y);
  pulse.setAttribute('r',63); pulse.setAttribute('fill','none');
  pulse.setAttribute('stroke',node.color+'40'); pulse.setAttribute('stroke-width','1');
  pulse.setAttribute('class','pulse-ring');
  svg.insertBefore(pulse, cg);

  // Children
  children.forEach((child, i) => {
    const a = (2*Math.PI*i/children.length) - Math.PI/2;
    const x = center.x + radius*Math.cos(a);
    const y = center.y + radius*Math.sin(a);
    const sz = child.children ? 42 : 36;

    const g = mkNode(x, y, child.name, child.subtitle||'', child.color, sz, false, animate?i:-1);
    g.addEventListener('click', () => handleNodeClick(child));
    g.addEventListener('mouseenter', e => showTooltip(e, child));
    g.addEventListener('mousemove', e => moveTooltip(e));
    g.addEventListener('mouseleave', hideTooltip);
    svg.appendChild(g);

    // Priority dot
    if (child.priority) {
      const pc = {high:'#f43f5e',medium:'#f59e0b',low:'#14b8a6'};
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',x+sz-8); dot.setAttribute('cy',y-sz+8);
      dot.setAttribute('r',5); dot.setAttribute('fill',pc[child.priority]);
      if(animate) dot.style.animation=`nodeEnter 0.5s ease ${0.08*i+0.3}s both`;
      svg.appendChild(dot);
    }

    // Child count badge
    if (child.children) {
      const bg = document.createElementNS('http://www.w3.org/2000/svg','g');
      if(animate) bg.style.animation=`nodeEnter 0.5s ease ${0.08*i+0.3}s both`;
      const bc = document.createElementNS('http://www.w3.org/2000/svg','circle');
      bc.setAttribute('cx',x+sz-4); bc.setAttribute('cy',y+sz-4); bc.setAttribute('r',11);
      bc.setAttribute('fill','#1a2236'); bc.setAttribute('stroke',child.color); bc.setAttribute('stroke-width','1.5');
      const bt = document.createElementNS('http://www.w3.org/2000/svg','text');
      bt.setAttribute('x',x+sz-4); bt.setAttribute('y',y+sz); bt.setAttribute('text-anchor','middle');
      bt.setAttribute('fill',child.color); bt.setAttribute('font-size','11'); bt.setAttribute('font-weight','700');
      bt.setAttribute('font-family','Inter,sans-serif'); bt.textContent=child.children.length;
      bg.appendChild(bc); bg.appendChild(bt); svg.appendChild(bg);
    }

    // Deep dive indicator
    if (child.deepDive && !child.children) {
      const arrow = document.createElementNS('http://www.w3.org/2000/svg','text');
      arrow.setAttribute('x',x); arrow.setAttribute('y',y+sz+18);
      arrow.setAttribute('text-anchor','middle'); arrow.setAttribute('fill',child.color+'80');
      arrow.setAttribute('font-size','11'); arrow.setAttribute('font-family','Inter,sans-serif');
      arrow.textContent='Click to deep dive \u2192';
      if(animate) arrow.style.animation=`nodeEnter 0.5s ease ${0.08*i+0.4}s both`;
      svg.appendChild(arrow);
    }

    // Impact bar
    if (child.impact && !child.children) {
      const bw=50, bx=x-bw/2, by=y+sz+(child.deepDive?28:18);
      const bbg = document.createElementNS('http://www.w3.org/2000/svg','rect');
      bbg.setAttribute('x',bx); bbg.setAttribute('y',by); bbg.setAttribute('width',bw);
      bbg.setAttribute('height',4); bbg.setAttribute('rx',2); bbg.setAttribute('fill','#1e293b');
      if(animate) bbg.style.animation=`nodeEnter 0.5s ease ${0.08*i+0.4}s both`;
      const bf = document.createElementNS('http://www.w3.org/2000/svg','rect');
      bf.setAttribute('x',bx); bf.setAttribute('y',by); bf.setAttribute('width',bw*child.impact/100);
      bf.setAttribute('height',4); bf.setAttribute('rx',2); bf.setAttribute('fill',child.color);
      if(animate) bf.style.animation=`nodeEnter 0.5s ease ${0.08*i+0.4}s both`;
      svg.appendChild(bbg); svg.appendChild(bf);
    }
  });

  updateBreadcrumb(); updateBackButton(); updateStats(node); updateLegend(node);
}

function mkNode(x,y,name,sub,color,size,isCenter,animIdx) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','node-group');
  if(animIdx>=0) g.style.animation=`nodeEnter 0.5s ease ${0.08*animIdx}s both`;

  const glow = document.createElementNS('http://www.w3.org/2000/svg','circle');
  glow.setAttribute('cx',x); glow.setAttribute('cy',y); glow.setAttribute('r',size+4);
  glow.setAttribute('fill','none'); glow.setAttribute('stroke',color+'20'); glow.setAttribute('stroke-width','2');
  g.appendChild(glow);

  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  c.setAttribute('cx',x); c.setAttribute('cy',y); c.setAttribute('r',size);
  c.setAttribute('fill',color+'15'); c.setAttribute('stroke',color);
  c.setAttribute('stroke-width',isCenter?2.5:1.5); c.setAttribute('class','node-circle');
  g.appendChild(c);

  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',x); t.setAttribute('y',sub?y-4:y+4);
  t.setAttribute('class','node-label'); t.setAttribute('font-size',isCenter?'15':'12');
  t.textContent = name.length>20 ? name.substring(0,18)+'...' : name;
  g.appendChild(t);

  if(sub) {
    const s = document.createElementNS('http://www.w3.org/2000/svg','text');
    s.setAttribute('x',x); s.setAttribute('y',y+14); s.setAttribute('class','node-sublabel');
    s.textContent=sub; g.appendChild(s);
  }
  return g;
}

// ══════════════════════════════════════════════
// NODE CLICK HANDLING
// ══════════════════════════════════════════════
function handleNodeClick(node) {
  if (animating) return;

  // Has children? Navigate deeper in graph
  if (node.children && node.children.length > 0) {
    navigateTo(node);
    return;
  }

  // Has deep dive content? Open deep dive page
  if (node.deepDive) {
    openDeepDive(node);
    return;
  }

  // Fallback: open panel with generic detail
  if (genericDetails[node.id]) {
    node._resolvedDetail = genericDetails[node.id];
  }
  openPanel(node);
}

// ══════════════════════════════════════════════
// DEEP DIVE PAGE
// ══════════════════════════════════════════════
function openDeepDive(node) {
  const dd = document.getElementById('deepDive');
  const contentFn = deepDiveContent[node.deepDive] || deepDiveContent._generic;

  // For generic template, attach resolved detail
  if (!deepDiveContent[node.deepDive] && genericDetails[node.id]) {
    node._resolvedDetail = genericDetails[node.id];
  }

  dd.innerHTML = contentFn(node);
  dd.scrollTop = 0;

  // Show
  dd.style.display = 'block';
  requestAnimationFrame(() => { dd.classList.add('visible'); });

  deepDiveOpen = true;
  document.getElementById('canvasView').style.display = 'none';
  document.getElementById('statsBar').style.display = 'none';
  document.getElementById('legend').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';

  // Update breadcrumb
  updateBreadcrumbForDeepDive(node);
}

function closeDeepDive() {
  const dd = document.getElementById('deepDive');
  dd.classList.remove('visible');
  setTimeout(() => {
    dd.style.display = 'none';
    dd.innerHTML = '';
  }, 350);
  deepDiveOpen = false;

  document.getElementById('canvasView').style.display = 'flex';
  document.getElementById('statsBar').style.display = 'flex';
  document.getElementById('legend').style.display = 'block';

  updateBreadcrumb();
  updateBackButton();
}

function updateBreadcrumbForDeepDive(node) {
  const bc = document.getElementById('breadcrumb');
  const path = [...navigationStack, currentNode];
  let html = '';
  path.forEach((n, i) => {
    if (i > 0) html += '<span class="breadcrumb-sep">&#9656;</span>';
    html += `<span class="breadcrumb-item" onclick="closeDeepDive();navigateToLevel(${i})">${n.name}</span>`;
  });
  html += `<span class="breadcrumb-sep">&#9656;</span>`;
  html += `<span class="breadcrumb-item active" style="color:${node.color}">${node.name}</span>`;
  bc.innerHTML = html;
}

// ══════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════
function navigateTo(node) {
  if(animating) return;
  animating = true;
  navigationStack.push(currentNode);
  currentNode = node;
  closePanel();
  renderGraph(node, true);
  setTimeout(() => { animating=false; }, 600);
}

function navigateBack() {
  if (deepDiveOpen) { closeDeepDive(); return; }
  if(animating || navigationStack.length===0) return;
  animating = true;
  currentNode = navigationStack.pop();
  closePanel();
  renderGraph(currentNode, true);
  setTimeout(() => { animating=false; }, 600);
}

function navigateToLevel(level) {
  if(animating) return;
  animating = true;
  while(navigationStack.length > level) currentNode = navigationStack.pop();
  closePanel();
  renderGraph(currentNode, true);
  setTimeout(() => { animating=false; }, 600);
}

// ══════════════════════════════════════════════
// DETAIL PANEL (for overview nodes)
// ══════════════════════════════════════════════
function openPanel(node) {
  const panel = document.getElementById('detailPanel');
  document.getElementById('detailTitle').textContent = node.name;
  const cat = document.getElementById('detailCategory');
  cat.textContent = [...navigationStack.map(n=>n.name), currentNode.name].join(' > ');
  cat.style.color = node.color;

  const d = node._resolvedDetail || {};
  let html = '';

  if(node.priority || node.impact) {
    html += '<div class="detail-section" style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">';
    if(node.priority) { const pc={high:'priority-high',medium:'priority-medium',low:'priority-low'}; html+=`<span class="priority-tag ${pc[node.priority]}">${node.priority.toUpperCase()}</span>`; }
    if(node.impact) html+=`<div style="flex:1;min-width:100px;"><div style="font-size:11px;color:var(--text-muted);">Impact: ${node.impact}/100</div><div class="impact-meter"><div class="impact-fill" style="width:${node.impact}%"></div></div></div>`;
    html += '</div>';
  }

  if(d.what) html+=`<div class="detail-section"><div class="detail-section-title">Overview</div><div class="detail-text">${d.what}</div></div>`;
  else if(node.description) html+=`<div class="detail-section"><div class="detail-section-title">Overview</div><div class="detail-text">${node.description}</div></div>`;

  if(node.claudeTools) html+=`<div class="detail-section"><div class="detail-section-title">Claude Code Capabilities</div><div style="display:flex;flex-wrap:wrap;gap:6px;">${node.claudeTools.map(t=>`<span class="claude-badge">${t}</span>`).join('')}</div></div>`;

  if(d.rugSpaSpecific) html+=`<div class="detail-section"><div class="detail-section-title">Rug Spa Actions</div><ul class="detail-list">${d.rugSpaSpecific.map(i=>`<li style="border-left-color:${node.color}">${i}</li>`).join('')}</ul></div>`;
  if(d.claudeWorkflow) html+=`<div class="detail-section"><div class="detail-section-title">Claude Code Workflows</div><ul class="detail-list">${d.claudeWorkflow.map(i=>`<li style="border-left-color:var(--accent-purple);background:rgba(139,92,246,0.08);"><span class="claude-badge">Claude</span> ${i}</li>`).join('')}</ul></div>`;
  if(d.metrics) html+=`<div class="detail-section"><div class="detail-section-title">Key Metrics</div><div style="display:flex;flex-wrap:wrap;gap:5px;">${d.metrics.map(m=>`<span style="padding:3px 8px;border-radius:6px;background:var(--bg-card);font-size:12px;color:var(--text-secondary);">${m}</span>`).join('')}</div></div>`;
  if(d.effort) html+=`<div class="detail-section"><div class="detail-section-title">Effort</div><div class="detail-text">${d.effort}</div></div>`;

  document.getElementById('detailBody').innerHTML = html;
  panel.classList.add('open');
  panelOpen = true;
}

function closePanel() {
  document.getElementById('detailPanel').classList.remove('open');
  panelOpen = false;
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  const path = [...navigationStack, currentNode];
  let html = '';
  path.forEach((n,i) => {
    if(i>0) html+='<span class="breadcrumb-sep">&#9656;</span>';
    const last = i===path.length-1;
    html+=`<span class="breadcrumb-item ${last?'active':''}" onclick="${last?'':`navigateToLevel(${i})`}" style="${last?`color:${n.color}`:''}">${n.name}</span>`;
  });
  bc.innerHTML = html;
}

function updateBackButton() {
  document.getElementById('backBtn').classList.toggle('visible', navigationStack.length>0);
}

function updateStats(node) {
  const ch = node.children||[];
  const hi = ch.filter(c=>c.priority==='high').length;
  const md = ch.filter(c=>c.priority==='medium').length;
  const exp = ch.filter(c=>c.children).length;
  const dd = ch.filter(c=>c.deepDive).length;
  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-chip"><span class="stat-number" style="color:var(--accent-blue)">${ch.length}</span><span class="stat-label">Areas</span></div>
    <div class="stat-chip"><span class="stat-number" style="color:var(--accent-rose)">${hi}</span><span class="stat-label">High Priority</span></div>
    <div class="stat-chip"><span class="stat-number" style="color:var(--accent-amber)">${md}</span><span class="stat-label">Medium</span></div>
    ${exp?`<div class="stat-chip"><span class="stat-number" style="color:var(--accent-teal)">${exp}</span><span class="stat-label">Expandable</span></div>`:''}
    ${dd?`<div class="stat-chip"><span class="stat-number" style="color:var(--accent-purple)">${dd}</span><span class="stat-label">Deep Dives</span></div>`:''}
  `;
}

function updateLegend(node) {
  const legend = document.getElementById('legend');
  const ch = node.children||[];
  if(!ch.length) { legend.style.opacity=0; return; }
  legend.style.opacity=1;
  const hasDD = ch.some(c=>c.deepDive);
  legend.innerHTML = `
    <div class="legend-title">Priority</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-rose)"></div><span class="legend-label">High</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-amber)"></div><span class="legend-label">Medium</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--accent-teal)"></div><span class="legend-label">Low</span></div>
    <div style="margin-top:8px" class="legend-title">Actions</div>
    <div class="legend-item"><span class="legend-label">Click to drill down</span></div>
    ${hasDD?'<div class="legend-item"><span class="legend-label">Deep dive \u2192 full page</span></div>':''}
  `;
}

// ══════════════════════════════════════════════
// TOOLTIP
// ══════════════════════════════════════════════
function showTooltip(e, node) {
  const tt = document.getElementById('tooltip');
  document.getElementById('tooltipTitle').textContent = node.name;
  let desc = node.children ? `${node.children.length} sub-areas \u2013 Click to explore` :
    node.deepDive ? 'Click for full deep dive \u2192' :
    node.description ? node.description.substring(0,120)+'...' : '';
  document.getElementById('tooltipDesc').textContent = desc;
  tt.classList.add('visible');
  moveTooltip(e);
}
function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left=(e.clientX+16)+'px'; tt.style.top=(e.clientY+16)+'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// ══════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    if(deepDiveOpen) closeDeepDive();
    else if(panelOpen) closePanel();
    else if(navigationStack.length>0) navigateBack();
  }
  if(e.key==='Backspace' && !e.target.matches('input')) { e.preventDefault(); navigateBack(); }
});

// ══════════════════════════════════════════════
// RESIZE + INIT
// ══════════════════════════════════════════════
window.addEventListener('resize', () => { if(!deepDiveOpen) renderGraph(currentNode, false); });
renderGraph(marketingData, true);
</script>
